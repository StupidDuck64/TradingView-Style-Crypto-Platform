spark.eventLog.enabled                    true
spark.eventLog.dir                        file:///opt/spark-events
spark.history.fs.logDirectory             file:///opt/spark-events
spark.eventLog.compress                   true
spark.eventLog.compression.codec          zstd

spark.history.ui.port                     18080
spark.history.fs.numReplayThreads         2
spark.history.retainedApplications        50
spark.history.fs.update.interval          30s

spark.sql.extensions                      org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

spark.driver.memory                       2g
spark.executor.memory                     2g
spark.sql.shuffle.partitions              8
spark.sql.session.timeZone                UTC

spark.sql.adaptive.enabled                false
spark.sql.parquet.enableVectorizedReader  true
spark.sql.autoBroadcastJoinThreshold      100m

spark.hadoop.fs.s3a.connection.ssl.enabled                false
spark.hadoop.fs.s3a.aws.credentials.provider              org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
spark.hadoop.fs.s3a.impl                                  org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3.impl                                   org.apache.hadoop.fs.s3a.S3AFileSystem
