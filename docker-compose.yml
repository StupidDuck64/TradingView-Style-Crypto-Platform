name: cryptoprice

# ─────────────────────────────────────────────────────────────────────────────
# NETWORK
# ─────────────────────────────────────────────────────────────────────────────
networks:
  crypto-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  kafka-data:
  minio-data:
  influxdb-data:
  influxdb-config:
  postgres-data:
  keydb-data:
  flink-checkpoints:
  spark-events:
  trino-data:
  dagster-home:
  letsencrypt:
  certbot-webroot:

services:
  # ══════════════════════════════════════════════════════════════════════════════
  # DATA LAYER
  # ══════════════════════════════════════════════════════════════════════════════

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_SEGMENT_BYTES: 134217728
      KAFKA_LOG_CLEANUP_POLICY: delete
      KAFKA_COMPRESSION_TYPE: lz4
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - crypto-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════════
  # SCHEMA REGISTRY  (Apicurio — Confluent-compatible API)
  # ═══════════════════════════════════════════════════════════════════════════════

  schema-registry:
    image: apicurio/apicurio-registry-mem:2.6.2.Final
    container_name: schema-registry
    hostname: schema-registry
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      QUARKUS_HTTP_PORT: 8080
    networks:
      - crypto-net
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # MinIO bucket init - runs once then exits
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/cryptoprice;
        mc mb --ignore-existing local/flink-checkpoints;
        echo 'Buckets ready.';
      "
    networks:
      - crypto-net
    restart: "no"

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    hostname: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keydb:
    image: eqalpha/keydb:latest
    container_name: keydb
    hostname: keydb
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: keydb-server --save 60 1 --loglevel warning --maxmemory 2560mb --maxmemory-policy allkeys-lru --hz 50 --tcp-backlog 511
    volumes:
      - keydb-data:/data
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ══════════════════════════════════════════════════════════════════════════════
  # COMPUTE LAYER
  # ══════════════════════════════════════════════════════════════════════════════

  flink-jobmanager:
    build:
      context: ./docker/flink
    image: cryptoprice/flink:1.18.1
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    restart: unless-stopped
    ports:
      - "8081:8081" # Flink Web UI
    command: jobmanager
    deploy:
      resources:
        limits:
          memory: 1792m
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      REDIS_HOST: keydb
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SCHEMA_REGISTRY_URL: http://schema-registry:8080/apis/ccompat/v7
    volumes:
      - ./:/app
      - flink-checkpoints:/tmp/flink-checkpoints
    networks:
      - crypto-net
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      keydb:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  flink-taskmanager:
    build:
      context: ./docker/flink
    image: cryptoprice/flink:1.18.1
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    restart: unless-stopped
    command: taskmanager
    deploy:
      resources:
        limits:
          memory: 4608m
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      REDIS_HOST: keydb
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SCHEMA_REGISTRY_URL: http://schema-registry:8080/apis/ccompat/v7
    volumes:
      - ./:/app
      - flink-checkpoints:/tmp/flink-checkpoints
    networks:
      - crypto-net
    depends_on:
      - flink-jobmanager

  spark-master:
    build:
      context: ./docker/spark
    container_name: spark-master
    hostname: spark-master
    restart: unless-stopped
    ports:
      - "7077:7077"
      - "8082:8080" # Spark Master UI
      - "18080:18080" # Spark History Server
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
      SPARK_HISTORY_OPTS: "-Dspark.history.fs.logDirectory=/opt/spark-events -Dspark.history.ui.port=18080"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      RETENTION_1M_DAYS: 90
    volumes:
      - ./:/app
      - spark-events:/opt/spark-events
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks:
      - crypto-net
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  spark-worker:
    build:
      context: ./docker/spark
    container_name: spark-worker
    hostname: spark-worker
    restart: unless-stopped
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4G
      SPARK_WORKER_CORES: 4
      SPARK_WORKER_WEBUI_PORT: 8084
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
    volumes:
      - ./:/app
      - spark-events:/opt/spark-events
    networks:
      - crypto-net
    depends_on:
      - spark-master

  # ══════════════════════════════════════════════════════════════════════════════
  # QUERY + ORCHESTRATION LAYER
  # ══════════════════════════════════════════════════════════════════════════════

  trino:
    build:
      context: ./docker/trino
    image: cryptoprice/trino:442
    container_name: trino
    hostname: trino
    restart: unless-stopped
    ports:
      - "8083:8080" # Trino UI (avoid conflict with spark UI on 8082)
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - trino-data:/data/trino
    networks:
      - crypto-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  dagster-webserver:
    build:
      context: ./docker/dagster
    image: cryptoprice/dagster:latest
    container_name: dagster-webserver
    hostname: dagster-webserver
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /app/orchestration/workspace.yaml
    environment:
      DAGSTER_HOME: /dagster-home
      DAGSTER_PG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/dagster
      SPARK_MASTER: spark://spark-master:7077
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./:/app
      - dagster-home:/dagster-home
      - spark-events:/opt/spark-events
    networks:
      - crypto-net
    depends_on:
      - postgres
      - spark-master

  dagster-daemon:
    build:
      context: ./docker/dagster
    image: cryptoprice/dagster:latest
    container_name: dagster-daemon
    restart: unless-stopped
    command: dagster-daemon run -w /app/orchestration/workspace.yaml
    environment:
      DAGSTER_HOME: /dagster-home
      DAGSTER_PG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/dagster
      SPARK_MASTER: spark://spark-master:7077
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RETENTION_1M_DAYS: 90
    volumes:
      - ./:/app
      - dagster-home:/dagster-home
      - spark-events:/opt/spark-events
    networks:
      - crypto-net
    depends_on:
      - dagster-webserver

  # ══════════════════════════════════════════════════════════════════════════════
  # SERVING LAYER (FastAPI)
  # ══════════════════════════════════════════════════════════════════════════════

  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    container_name: fastapi
    hostname: fastapi
    ports:
      - "8080:8000"
    restart: unless-stopped
    environment:
      REDIS_HOST: keydb
      REDIS_PORT: 6379
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      CORS_ORIGINS: "*"
      TRINO_HOST: trino
      TRINO_PORT: 8080
    networks:
      - crypto-net
    depends_on:
      keydb:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      trino:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ══════════════════════════════════════════════════════════════════════════════
  # FRONTEND (Nginx + React SPA)
  # ══════════════════════════════════════════════════════════════════════════════

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: cryptoprice/nginx:latest
    container_name: nginx
    hostname: nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CERTBOT_DOMAIN=${CERTBOT_DOMAIN:-localhost}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    restart: unless-stopped
    networks:
      - crypto-net
    depends_on:
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ══════════════════════════════════════════════════════════════════════════════
  # PRODUCER (long-running stream)
  # ══════════════════════════════════════════════════════════════════════════════

  # ══════════════════════════════════════════════════════════════════════════════
  # INFLUXDB BACKFILL (one-shot on startup – fills gap caused by machine downtime)
  # ══════════════════════════════════════════════════════════════════════════════

  influx-backfill:
    build:
      context: .
      dockerfile: docker/backfill/Dockerfile
    container_name: influx-backfill
    restart: "no"
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
    networks:
      - crypto-net
    depends_on:
      influxdb:
        condition: service_healthy

  producer:
    build:
      context: ./docker/producer
    container_name: producer
    hostname: producer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KLINE_INTERVAL: "1s"
      SCHEMA_REGISTRY_URL: http://schema-registry:8080/apis/ccompat/v7
    volumes:
      - ./:/app
    networks:
      - crypto-net
    depends_on:
      kafka:
        condition: service_healthy

  # ══════════════════════════════════════════════════════════════════════════════
  # CANDLE AGGREGATOR — DISABLED (1s→1m aggregation now handled in-flight
  # by Flink KlineWindowAggregator, no extra container needed)
  # ══════════════════════════════════════════════════════════════════════════════

  # candle-aggregator:
  #   build:
  #     context: .
  #     dockerfile: docker/backfill/Dockerfile
  #   container_name: candle-aggregator
  #   restart: unless-stopped
  #   environment:
  #     REDIS_HOST: keydb
  #     REDIS_PORT: 6379
  #     INFLUX_URL: http://influxdb:8086
  #     INFLUX_TOKEN: ${INFLUX_TOKEN}
  #     INFLUX_ORG: ${INFLUX_ORG}
  #     INFLUX_BUCKET: ${INFLUX_BUCKET}
  #   volumes:
  #     - ./src:/app/src
  #   networks:
  #     - crypto-net
  #   depends_on:
  #     keydb:
  #       condition: service_healthy
  #     influxdb:
  #       condition: service_healthy

# candle-aggregator service REMOVED — 1s→1m aggregation now handled
# in-flight by Flink KlineWindowAggregator (zero extra containers).
