# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for Crypto Dashboard
# ─────────────────────────────────────────────────────────────────────────────
# - Serves React SPA static files at /
# - Proxies /api/* requests to FastAPI backend (fastapi:8000)
# - Handles WebSocket upgrade for /api/stream
# - HTTPS via Let's Encrypt (certbot webroot mode)
# - Rate limiting and security headers
# ─────────────────────────────────────────────────────────────────────────────

upstream fastapi_backend {
    server fastapi:8000;
}

# Map to conditionally set Connection header for WebSocket upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Rate limiting zones ───────────────────────────────────────────
# API: 30 requests/sec per IP with burst tolerance
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
# WebSocket: 5 connections/sec per IP (initial handshake only)
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/s;

# ── HTTP: ACME challenge + redirect to HTTPS ──────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/${CERTBOT_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${CERTBOT_DOMAIN}/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Request limits ────────────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── WebSocket endpoint ────────────────────────────────────────
    location /api/stream {
        limit_req zone=ws_limit burst=10 nodelay;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        tcp_nodelay on;
    }

    # ── REST API proxy ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── React SPA (catch-all for client-side routing) ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching (Vite hashed bundles) ─────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Font and image caching ────────────────────────────────────
    location ~* \.(woff2?|ttf|eot|otf|ico|svg|png|jpg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
